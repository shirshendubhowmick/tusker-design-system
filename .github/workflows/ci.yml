name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Local Turbo cache across CI runs (same branch / PR re-runs).
      # Hash inputs still re-run tasks when sources change; this only restores
      # unchanged package task artifacts (typecheck / unit test / app build).
      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-
            turbo-${{ runner.os }}-

      # Codegen drift — must stay before app typecheck/build
      - name: Check token CSS is up to date
        run: pnpm tokens:check

      - name: Check package exports map is up to date
        run: pnpm exports:check

      - name: Format
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Unit / jsdom only — Storybook axe is the on-demand a11y workflow
      - name: Test
        run: pnpm test

      # Apps only (DS is JIT — no library dist build)
      - name: Build apps
        run: pnpm build
